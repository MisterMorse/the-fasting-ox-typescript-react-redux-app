server {
    listen 80;
    server_name localhost;

    # API Routing (Added ^~ modifier to prevent regex overrides)
    location ^~ /api/v1/ {
        proxy_pass http://the-fasting-ox-python-django-api:8001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Django Static Files (Admin portal styling)
    location ^~ /static/ {
        alias /usr/share/nginx/html/django_static/;
    }

    # API Admin Portal (Added ^~ modifier to prevent regex overrides)
    location ^~ /admin/ {
        proxy_pass http://the-fasting-ox-python-django-api:8001;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # React Assets Caching (Added negative lookahead to protect API paths)
    location ~* ^(?!/(api|admin|static/)).*\.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
